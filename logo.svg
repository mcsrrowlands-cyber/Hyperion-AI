<svg xmlns="http://www.w3.org/2000/svg" viewBox="1 1 98 98">
  <!-- 8 main broad petals — tips pushed to y=1 for maximum fill -->
  <g fill="#5C50CC">
    <path d="M50,37 C43,33 38,15 50,1 C62,15 57,33 50,37Z" transform="rotate(0,50,50)"/>
    <path d="M50,37 C43,33 38,15 50,1 C62,15 57,33 50,37Z" transform="rotate(45,50,50)"/>
    <path d="M50,37 C43,33 38,15 50,1 C62,15 57,33 50,37Z" transform="rotate(90,50,50)"/>
    <path d="M50,37 C43,33 38,15 50,1 C62,15 57,33 50,37Z" transform="rotate(135,50,50)"/>
    <path d="M50,37 C43,33 38,15 50,1 C62,15 57,33 50,37Z" transform="rotate(180,50,50)"/>
    <path d="M50,37 C43,33 38,15 50,1 C62,15 57,33 50,37Z" transform="rotate(225,50,50)"/>
    <path d="M50,37 C43,33 38,15 50,1 C62,15 57,33 50,37Z" transform="rotate(270,50,50)"/>
    <path d="M50,37 C43,33 38,15 50,1 C62,15 57,33 50,37Z" transform="rotate(315,50,50)"/>
    <!-- 8 secondary narrow petals between main ones -->
    <path d="M50,39 C49,36 48,28 50,18 C52,28 51,36 50,39Z" transform="rotate(22.5,50,50)"/>
    <path d="M50,39 C49,36 48,28 50,18 C52,28 51,36 50,39Z" transform="rotate(67.5,50,50)"/>
    <path d="M50,39 C49,36 48,28 50,18 C52,28 51,36 50,39Z" transform="rotate(112.5,50,50)"/>
    <path d="M50,39 C49,36 48,28 50,18 C52,28 51,36 50,39Z" transform="rotate(157.5,50,50)"/>
    <path d="M50,39 C49,36 48,28 50,18 C52,28 51,36 50,39Z" transform="rotate(202.5,50,50)"/>
    <path d="M50,39 C49,36 48,28 50,18 C52,28 51,36 50,39Z" transform="rotate(247.5,50,50)"/>
    <path d="M50,39 C49,36 48,28 50,18 C52,28 51,36 50,39Z" transform="rotate(292.5,50,50)"/>
    <path d="M50,39 C49,36 48,28 50,18 C52,28 51,36 50,39Z" transform="rotate(337.5,50,50)"/>
  </g>
  <!-- White leaf-vein cutouts inside each main petal -->
  <g fill="white">
    <path d="M50,36 C48.5,30 48.5,17 50,6 C51.5,17 51.5,30 50,36Z" transform="rotate(0,50,50)"/>
    <path d="M50,36 C48.5,30 48.5,17 50,6 C51.5,17 51.5,30 50,36Z" transform="rotate(45,50,50)"/>
    <path d="M50,36 C48.5,30 48.5,17 50,6 C51.5,17 51.5,30 50,36Z" transform="rotate(90,50,50)"/>
    <path d="M50,36 C48.5,30 48.5,17 50,6 C51.5,17 51.5,30 50,36Z" transform="rotate(135,50,50)"/>
    <path d="M50,36 C48.5,30 48.5,17 50,6 C51.5,17 51.5,30 50,36Z" transform="rotate(180,50,50)"/>
    <path d="M50,36 C48.5,30 48.5,17 50,6 C51.5,17 51.5,30 50,36Z" transform="rotate(225,50,50)"/>
    <path d="M50,36 C48.5,30 48.5,17 50,6 C51.5,17 51.5,30 50,36Z" transform="rotate(270,50,50)"/>
    <path d="M50,36 C48.5,30 48.5,17 50,6 C51.5,17 51.5,30 50,36Z" transform="rotate(315,50,50)"/>
  </g>
  <!-- Centre circle covers vein bases; white stroke ring separates petals from centre -->
  <circle cx="50" cy="50" r="22" fill="#5C50CC" stroke="white" stroke-width="2.5"/>
  <!-- H letter -->
  <text x="50" y="59" text-anchor="middle" fill="white" font-size="28" font-weight="800" font-family="Arial, sans-serif">H</text>
</svg>
